# Supervised ATM'22 + topology/geometry loss stack. ACTIVE loss: HYBRID clDice w=2 + cbDice w=3
# (radius-blind centerline recall + radius-aware wall fidelity, both on). Switch the active loss by
# editing the `loss:` weights below (one config, edited in place — keeps the PBS free of overrides).
# Identical to supervised_atm.yaml (same split/seed, so it is a paired comparison)
# except for the added topology/geometry loss terms. Run with:
#   --data-config configs/data/atm22.yaml
# Compare against supervised-atm-l20 (0.609) on Dice AND distal recall / TD
# (scripts/analyse_distal.py).

experiment_name: supervised-atm-l20-cldice-w2-cbdice-w3
study_name: atm-l20-supervised
run_label: cldice-w2-cbdice-w3-p96
description: "Supervised ATM'22 (20 labelled) + HYBRID clDice w=2 (radius-blind centerline recall) + cbDice w=3 (radius-aware centerline-boundary Dice, Shi et al. MICCAI 2024). Tests whether combining tree-recovering clDice with wall-tightening cbDice gives BOTH a complete distal tree AND thin walls — the gap each standalone run missed: cbDice-w2 (clean walls, but TD 0.42 vs clDice-w2's 0.61) and clDice-w2 (TD 0.61, but raw Dice 0.13 / heavy LCC reliance)."
seed: 15
# Reproducibility: seed Python/NumPy/torch + force deterministic cuDNN so the
# paired baseline-vs-clDice comparison is not seed/autotuner noise. Costs some
# throughput (cuDNN autotuner off, slower 3D convs) — set false only for
# throwaway speed runs, never for a reported number. Defaults to true in code.
deterministic: true
# More epochs than the plain baseline: 15 are pure Dice+BCE warm-up before the topology
# terms engage, then a 10-epoch ramp (full weight ~ep25). The clDice+cbDice hybrid carries
# two topology terms at heavier total weight, so it converges slower than either solo run
# (both of which were still climbing at 75-80ep) — 100 epochs gives headroom past the ramp.
epochs: 100
training_regime: patch
batch_size: 1
num_workers: 4

# Same counts + seed as supervised_atm.yaml -> identical test/val/labelled sets.
labelled_split:
  test_count: 20
  val_count: 20
  labelled_count: 20

sampling:
  patch_size: [96, 96, 96]
  patches_per_case: 4
  foreground_probability: 0.7
  cache_rate: 0.5

validation:
  validate_every: 5
  roi_size: [96, 96, 96]
  sw_batch_size: 4
  inference_overlap: 0.5
  threshold: 0.99

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001

scheduler:
  name: cosine
  warmup_epochs: 10

amp:
  enabled: true

loss:
  dice_weight: 1.0
  bce_weight: 1.0
  positive_class_weight: 10.0
  # Topology/geometry loss — clDice and cbDice can run together (hybrid) or solo (set one to 0).
  # clDice (soft centerline Dice, radius-BLIND) — ON at weight 2: recovers the distal tree
  # (centerline recall). cldice_iterations >= max airway radius (~10). Both terms NEED the warm-up:
  # pure Dice+BCE for *_warmup_epochs, then ramp over *_rampup_epochs (the soft skeleton of an
  # untrained model is noise). clDice + cbDice share the same warm-up/ramp schedule below.
  cldice_weight: 2.0
  cldice_iterations: 10
  cldice_warmup_epochs: 15
  cldice_rampup_epochs: 10
  # cbDice (centerline boundary Dice, Shi et al., MICCAI 2024; github.com/PengchengShi1220/cbDice)
  # — the RADIUS-AWARE variant of clDice: folds the distance transform (local radius) into the
  # centerline precision/sensitivity, adding the wall-thickness/calibre fidelity clDice lacks (the
  # loss-level fix for fat distal tubes). ON at weight 3 alongside clDice — slightly out-weights it
  # because the wall over-segmentation is the harder residual. Warmed-up like clDice. NB: cbDice EDT
  # runs on CPU (scipy) → slower per step; with clDice ALSO on, each batch now does both skeleton
  # passes, so this hybrid is slower than the cbDice-w2-solo run (~7 h/8 h) — give the PBS walltime margin.
  cbdice_weight: 3.0
  cbdice_iterations: 10
  cbdice_warmup_epochs: 15
  cbdice_rampup_epochs: 10
  # EXPERIMENTAL — persistent-homology topology loss. 0.0 = OFF (default; live runs
  # unaffected). Needs `torch-topological`. Enable via --topo-weight or here; it is
  # ramped with the same warm-up as clDice. See losses/topology.py::persistent_homology_loss.
  topo_weight: 0.0
  topo_warmup_epochs: 15
  topo_rampup_epochs: 10
