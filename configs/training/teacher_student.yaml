# What belongs here:
# - semi-supervised training settings
# - teacher EMA settings
# - pseudo-label thresholds
# - weights for consistency and uncertainty-aware losses

experiment_name: mean-teacher-warmstart-pw10-th99
description: "Mean Teacher fine-tuned from the 0.665 supervised baseline (warm-started student+teacher) with ATM'22 consistency. pos_weight=10, threshold=0.99."
seed: 15
epochs: 40
training_regime: patch
batch_size: 1
batch_size_unlabelled: 1
num_workers: 4

# Warm-start both student and teacher from the supervised baseline so the
# teacher generates good pseudo-labels from epoch 1. Path is project-relative or
# absolute; override on the CLI with --init-checkpoint for HPC paths.
# null = train from scratch (canonical Mean Teacher).
init_checkpoint: null

splits:
  train_fraction: 0.80
  val_fraction: 0.15
  test_fraction: 0.05

teacher:
  ema_decay: 0.99
  # Warm-started: the teacher is already the converged baseline, so no supervised
  # warm-up is needed. Phase consistency in gently over the first few epochs so
  # the new ATM'22 signal does not shock the converged weights.
  warm_start_epochs: 0
  consistency_rampup_epochs: 5
  # Lower than the 0.99 validation threshold so the teacher also pseudo-labels
  # distal branches (moderate-confidence voxels). Voxels in (0.80, 0.99) are
  # uncertain but directionally correct — including them lets ATM'22 contribute
  # consistency signal for fine airways, not just the proximal tree.
  foreground_confidence_threshold: 0.80
  background_confidence_threshold: 0.20


sampling:
  patch_size: [96, 96, 96]
  patches_per_case: 4
  foreground_probability: 0.7
  cache_rate: 0.5

# ATM'22 volumes are substantially larger than AeroPath crops. Caching loaded
# full volumes can exhaust host memory, so keep the unlabeled cache disabled.
unlabelled_sampling:
  cache_rate: 0.0

validation:
  validate_every: 1
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  inference_overlap: 0.75
  threshold: 0.99

optimizer:
  name: adamw
  # Fine-tuning LR — ~1/3 of the baseline's 3e-4. Low enough to preserve the
  # converged features, high enough for the consistency signal to move the model.
  lr: 0.0001
  weight_decay: 0.00001

scheduler:
  name: cosine
  # No LR warm-up when fine-tuning: start at the fine-tune LR and cosine-decay.
  warmup_epochs: 0

amp:
  enabled: true

loss:
  dice_weight: 1.0
  bce_weight: 1.0
  positive_class_weight: 10.0
  consistency_weight: 1.0
