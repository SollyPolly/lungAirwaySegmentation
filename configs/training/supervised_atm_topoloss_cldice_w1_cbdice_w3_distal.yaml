# Supervised ATM'22 hybrid topology/geometry loss + RE-TUNED distal sampling.
# Re-tune of the cl1+cb2+distal run (which was a WASH + over-predicted, lcc-kept 0.64->0.42):
# raise cbDice to 3 (more connectivity/precision pressure) AND soften the distal patch ratio
# 0.6 -> 0.4 (less distribution shift), to test whether a fair-tuned distal run beats the
# cl1+cb2 no-distal leader. See PROJECT_STATE "ACTIVE (2026-06-28)" for the decision rule.
# NOTE: both knobs push precision-ward (cb3 was timid at the old distribution) -> keep ratio
# at 0.4, not lower, so the distal-recall edge survives. radius stays 2.0 -> existing r2 precompute covers it.

experiment_name: supervised-atm-l20-cldice-w1-cbdice-w3-distal
study_name: atm-l20-supervised
run_label: cldice-w1-cbdice-w3-p96-distal04
description: "Supervised ATM'22 (20 labelled) + clDice w=1 + cbDice w=3 + distal sampling at a SOFTER ratio (0.4 distal vs the 0.6 of the cl1+cb2+distal run). Re-tune to give distal sampling a fair shot: cb3 restores connectivity/precision lost to the recall-heavy distal distribution; 0.4 ratio keeps a distal-recall edge without the over-prediction. Decision rule: raw TD up and/or clDice|TLD beats the leader at matched op-point, with distal r=1 recall >=0.80."
seed: 15
deterministic: true
epochs: 100
training_regime: patch
batch_size: 1
num_workers: 4

labelled_split:
  test_count: 20
  val_count: 20
  labelled_count: 20

sampling:
  patch_size: [96, 96, 96]
  patches_per_case: 4
  foreground_probability: 0.7
  cache_rate: 0.5
  # Distal hard-mining ENABLED, SOFTER than the cl1+cb2+distal run.
  distal_sampling:
    enabled: true
    distal_radius_voxels: 2.0
    ratios: [0.3, 0.3, 0.4]   # [background, proximal-airway, distal-skeleton] — softened from [0.2,0.2,0.6]

validation:
  validate_every: 5
  roi_size: [96, 96, 96]
  sw_batch_size: 4
  inference_overlap: 0.5
  threshold: 0.99

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001

scheduler:
  name: cosine
  warmup_epochs: 10

amp:
  enabled: true

loss:
  dice_weight: 1.0
  bce_weight: 1.0
  positive_class_weight: 10.0
  cldice_weight: 1.0
  cldice_iterations: 10
  cldice_warmup_epochs: 15
  cldice_rampup_epochs: 10
  cbdice_weight: 3.0
  cbdice_iterations: 10
  cbdice_warmup_epochs: 15
  cbdice_rampup_epochs: 10
  topo_weight: 0.0
  topo_warmup_epochs: 15
  topo_rampup_epochs: 10
