# Controlled larger-context ablation of the frozen clDice-weight-2 model.
# Compared with supervised_atm_cldice.yaml, only patch/validation window sizes
# and validation sliding-window batch size change.

experiment_name: supervised-atm-l20-cldice-w2-patch128
description: "ATM'22 clDice-weight-2 model with 128^3 patches to test whether additional context reduces raw blobbiness and LCC reliance."
seed: 15
deterministic: true
epochs: 80
training_regime: patch
batch_size: 1
num_workers: 4

labelled_split:
  test_count: 20
  val_count: 20
  labelled_count: 20

sampling:
  patch_size: [128, 128, 128]
  patches_per_case: 4
  foreground_probability: 0.7
  cache_rate: 0.5

validation:
  validate_every: 5
  roi_size: [128, 128, 128]
  sw_batch_size: 1
  inference_overlap: 0.5
  threshold: 0.99

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001

scheduler:
  name: cosine
  warmup_epochs: 10

amp:
  enabled: true

loss:
  dice_weight: 1.0
  bce_weight: 1.0
  positive_class_weight: 10.0
  cldice_weight: 2.0
  cldice_iterations: 10
  cldice_warmup_epochs: 15
  cldice_rampup_epochs: 10
  topo_weight: 0.0
  topo_warmup_epochs: 15
  topo_rampup_epochs: 10
