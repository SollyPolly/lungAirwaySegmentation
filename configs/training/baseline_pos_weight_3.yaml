# Controlled patch-based baseline retrain with reduced BCE positive-class weight.

experiment_name: baseline-unet-pos-weight-3
description: "Controlled baseline retrain with BCE positive-class weight 3; all other training settings match the corrected patch baseline."
training_regime: patch
seed: 15
epochs: 50
batch_size: 1
num_workers: 4

splits:
  train_fraction: 0.8
  val_fraction: 0.15
  test_fraction: 0.05

sampling:
  patch_size: [96, 96, 96]
  patches_per_case: 4
  foreground_probability: 0.7
  cache_rate: 0.5

validation:
  validate_every: 1
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  inference_overlap: 0.75
  # Provisional checkpoint-selection threshold. Sweep validation probabilities
  # after training before choosing the final inference threshold.
  threshold: 0.75

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001

scheduler:
  name: cosine
  warmup_epochs: 10

amp:
  enabled: true

loss:
  dice_weight: 1.0
  bce_weight: 1.0
  positive_class_weight: 3.0
