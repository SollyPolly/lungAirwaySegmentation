# Supervised ATM'22 (20 labelled) — cl1+cb2 recipe + LUNG-BBOX CROP (pipeline upgrade, Stage C).
#
# The lever (PROJECT_STATE 2026-07-01): ATM'22 ships no lung masks, so our pipeline crops to
# the whole-body CT foreground (CropForegroundd source_key=image) — brutal imbalance + wasted
# capacity vs the ATM'22 top teams, all of whom crop to the lungs. We now precompute lung masks
# with the `lungmask` U-Net (scripts/precompute_lung_masks.py -> data/ATM22/lungTr/) and crop
# CT + airway to the lung bounding box (+margin) instead, concentrating capacity on the airway
# region. This is INFRASTRUCTURE UNDER clDice, not a replacement — the loss is unchanged from
# the frozen cl1+cb2 leader, so a delta is attributable to the crop alone. [[framing-topology-is-means]]
#
# This is the CLEAN 20-label ablation vs the frozen cl1+cb2 leader: ONLY sampling.lung_crop
# changes (everything else identical to supervised_atm_topoloss_cldice_w1_cbdice_w2.yaml). Same
# sealed 20 val + 20 test (seed 15). Also re-run the Dice+BCE baseline lung-cropped (add
# --lung-crop --lung-crop-margin to its command) so the clDice delta stays attributable on the
# stronger pipeline.
#
# PRE-REQ: scripts/precompute_lung_masks.py must have written data/ATM22/lungTr/ATM_XXX_lung.nii.gz
# for every train+val case (a missing mask raises with the precompute command).
#
# EVAL PARITY (handled): analyse_distal sources sampling.lung_crop from the run's own resolved_config
# and applies the SAME LungTracheaCropd to CT+GT, so a lung-cropped model is scored on the FOV it
# trained on. Frozen full-volume baselines have no sampling.lung_crop -> evaluated full-volume, unchanged.
# NB comparability: lung-cropped metrics are in the lung FOV; the clean attribution is loss-vs-loss on
# this SAME pipeline (re-run the Dice+BCE baseline lung-cropped too), not vs the full-volume leader.
#
# CROP STRATEGY: lung_with_trachea_extension (inference-valid — needs only CT + lungmask, never
# the GT airway). Measured over all 150 ATM cases: the airway never overhangs the lung bbox
# in-plane/inferiorly, but the cervical trachea overhangs it SUPERIORLY by up to ~100 vox — so
# we extend the bbox superiorly (superior_margin_voxels) and keep a modest margin elsewhere. The
# superior axis is read from the image affine per case. (lung_union_airway is an ORACLE crop —
# it uses the label to set the FOV — kept only as an upper-bound diagnostic, NOT for val/test.)

experiment_name: supervised-atm-l20-cldice-w1-cbdice-w2-lungcrop
study_name: atm-l20-supervised
run_label: cldice-w1-cbdice-w2-p96-lungcrop
description: "Supervised ATM'22 (20 labelled) cl1+cb2 recipe + lung-bbox crop (lungmask, margin=12): crop CT + airway to the lung bounding box instead of the whole-body CT foreground, concentrating capacity on the airway region. Loss identical to the frozen cl1+cb2 leader, so a delta is attributable to the lung crop alone. Clean 20-label pipeline ablation; same sealed val/test (seed 15)."
seed: 15
deterministic: true
epochs: 100
training_regime: patch
batch_size: 1
num_workers: 4

labelled_split:
  test_count: 20
  val_count: 20
  labelled_count: 20

sampling:
  patch_size: [96, 96, 96]
  patches_per_case: 4
  foreground_probability: 0.7
  cache_rate: 0.5
  # Lung-bbox crop with superior trachea extension (pipeline upgrade, inference-valid).
  # enabled=false = CT-foreground crop (prior behaviour).
  lung_crop:
    enabled: true
    strategy: lung_with_trachea_extension
    margin_voxels: 8            # in-plane + inferior margin (airway never overhangs here)
    superior_margin_voxels: 120 # superior extension to keep the cervical trachea (max overhang ~100)
  # Distal patch sampling is a separate lever — keep it OFF so this run isolates the lung crop.
  distal_sampling:
    enabled: false
    distal_radius_voxels: 2.0
    ratios: [0.2, 0.2, 0.6]

validation:
  validate_every: 5
  roi_size: [96, 96, 96]
  sw_batch_size: 4
  inference_overlap: 0.5
  threshold: 0.99

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001

scheduler:
  name: cosine
  warmup_epochs: 10

amp:
  enabled: true

loss:
  dice_weight: 1.0
  bce_weight: 1.0
  positive_class_weight: 10.0
  cldice_weight: 1.0
  cldice_iterations: 10
  cldice_warmup_epochs: 15
  cldice_rampup_epochs: 10
  cbdice_weight: 2.0
  cbdice_iterations: 10
  cbdice_warmup_epochs: 15
  cbdice_rampup_epochs: 10
  topo_weight: 0.0
  topo_warmup_epochs: 15
  topo_rampup_epochs: 10
