# CT-FM initialized SegResNet for airway segmentation fine-tuning.

model_name: ct_fm_segresnet
spatial_dims: 3
in_channels: 1
out_channels: 1
init_filters: 32
blocks_down: [1, 2, 2, 4, 4]
dsdepth: 1
norm: batch
act: relu

pretrained:
  enabled: true
  source: hub
  variant: encoder
  repo_id: project-lighter/ct_fm_feature_extractor
  freeze_encoder: false
