# What belongs here:
# - the plain supervised baseline model
# - nothing topology-specific or semi-supervised
# - enough parameters to reproduce your first strong reference run

model_name: baseline_unet
spatial_dims: 3
in_channels: 1
out_channels: 1
channels: [16, 32, 64, 128, 256]
strides: [2, 2, 2, 2]
dropout: 0.0
normalization: instance
activation: leaky_relu
